name: Build and Push Custom Caddy

on:
  schedule:
    - cron: "5 0 * * *"
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check and Update Caddy Version
        id: version_check
        run: |
          # 1. 获取当前 Dockerfile 中的版本
          CURRENT_VERSION=$(grep -oP '(?<=ARG CADDY_VERSION=).*' Dockerfile)
          echo "Current version in Dockerfile: $CURRENT_VERSION"

          # 2. 获取 Docker Hub 官方最新的纯数字版本号
          LATEST_VERSION=$(curl -s https://registry.hub.docker.com/v2/repositories/library/caddy/tags?page_size=100 | jq -r '.results[].name' | grep -E "^[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n 1)
          echo "Latest Caddy version on Docker Hub: $LATEST_VERSION"

          if [ -z "$LATEST_VERSION" ]; then
            echo "Failed to fetch latest version."
            exit 1
          fi

          # 3. 对比版本并决定是否需要构建
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "New version detected! Updating Dockerfile..."
            sed -i "s/ARG CADDY_VERSION=$CURRENT_VERSION/ARG CADDY_VERSION=$LATEST_VERSION/" Dockerfile
            
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add Dockerfile
            git commit -m "chore: auto-bump Caddy version to $LATEST_VERSION [skip ci]"
            git push
            
            echo "VERSION=$LATEST_VERSION" >> $GITHUB_ENV
            echo "BUILD_NEEDED=true" >> $GITHUB_ENV
          else
            echo "Version is up to date."
            echo "VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
            
            # 智能判断逻辑：
            # 如果是定时任务触发且版本没变，则不构建 (BUILD_NEEDED=false)
            # 如果是手动触发或推送代码，即使版本没变也强制构建 (BUILD_NEEDED=true)
            if [ "${{ github.event_name }}" == "schedule" ]; then
              echo "Scheduled run with no version change. Skipping build."
              echo "BUILD_NEEDED=false" >> $GITHUB_ENV
            else
              echo "Triggered by ${{ github.event_name }}. Forcing build."
              echo "BUILD_NEEDED=true" >> $GITHUB_ENV
            fi
          fi

      # 只有在 BUILD_NEEDED 为 true 时，才执行提取标签步骤
      - name: Extract metadata for Docker
        if: env.BUILD_NEEDED == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/caddy-build
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}
            type=ref,event=tag
            type=sha,format=short

      # 只有在 BUILD_NEEDED 为 true 时，才执行耗时的多架构编译和推送步骤
      - name: Build and push Docker image
        if: env.BUILD_NEEDED == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CADDY_VERSION=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
